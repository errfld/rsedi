# Partner strict INVOIC schema profile
# Demonstrates stricter DTM modeling while inheriting baseline segment coverage.

name: "partner_invoic_strict"
version: "1.0"
parent:
  name: "EANCOM_INVOIC"
  version: "D96A"

segments:
  - tag: DTM
    is_mandatory: true
    max_repetitions: 10
    elements:
      # The parser currently materializes DTM as composite children under e1
      # (c1/c2/c3) rather than a scalar e1 value. Keep e1 constraints permissive
      # so this profile remains compatible until component-level schema support is added.
      - id: "e1"
        name: "date_time_period"
        data_type: "an"
        is_mandatory: false
        min_length: 0
        max_length: 35
      - id: "e2"
        name: "date_time_value"
        data_type: "an"
        is_mandatory: false
        min_length: 0
        max_length: 35
      - id: "e3"
        name: "date_time_format"
        data_type: "an"
        is_mandatory: false
        min_length: 0
        max_length: 3
