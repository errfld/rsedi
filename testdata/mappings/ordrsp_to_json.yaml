name: ordrsp_to_json
source_type: EANCOM_ORDRSP
target_type: JSON_ORDRSP

rules:
  - type: field
    source: /BGM/e2
    target: response_number

  - type: field
    source: /DTM/e1
    target: response_date

  - type: foreach
    source: /LIN
    target: lines
    rules:
      - type: field
        source: e1
        target: line_number
      - type: field
        source: e3
        target: item_id
      - type: field
        source: QTY/e1
        target: confirmed_quantity
      - type: field
        source: PRI/e1
        target: unit_price
