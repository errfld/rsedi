name: slsrpt_to_csv
source_type: EANCOM_SLSRPT
target_type: CSV_SLSRPT

rules:
  - type: foreach
    source: LINE_ITEM
    target: rows
    rules:
      - type: field
        source: /BGM/e2
        target: report_number
      - type: field
        source: LIN/e1
        target: line_number
      - type: field
        source: LIN/e3/c1
        target: item_id
      - type: field
        source: QTY[c1='153']/e1/c2
        target: quantity
      - type: field
        source: MOA[c1='203']/e1/c2
        target: line_amount
