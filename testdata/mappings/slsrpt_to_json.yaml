name: slsrpt_to_json
source_type: EANCOM_SLSRPT
target_type: JSON_SLSRPT

rules:
  - type: field
    source: /BGM/e2
    target: report_number

  - type: field
    source: /DTM/e1
    target: report_date

  - type: foreach
    source: /LIN
    target: lines
    rules:
      - type: field
        source: e1
        target: line_number
      - type: field
        source: e3
        target: item_id
      - type: field
        source: QTY/e1
        target: reported_quantity
      - type: field
        source: MOA/e1
        target: line_amount
