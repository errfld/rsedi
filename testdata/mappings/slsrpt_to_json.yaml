name: slsrpt_to_json
source_type: EANCOM_SLSRPT
target_type: JSON_SLSRPT

rules:
  - type: field
    source: /BGM/e2
    target: report_number

  - type: field
    source: /DTM/e1/c2
    target: report_date

  - type: foreach
    source: LINE_ITEM
    target: lines
    rules:
      - type: field
        source: LIN/e1
        target: line_number
      - type: field
        source: LIN/e3/c1
        target: item_id
      - type: field
        source: QTY/e1/c2
        target: reported_quantity
      - type: field
        source: MOA/e1/c2
        target: line_amount
