name: ordrsp_to_csv
source_type: EANCOM_ORDRSP
target_type: CSV_ORDRSP

rules:
  - type: foreach
    source: /LIN
    target: rows
    rules:
      - type: field
        source: /BGM/e2
        target: response_number
      - type: field
        source: e1
        target: line_number
      - type: field
        source: e3
        target: item_id
      - type: field
        source: QTY/e1
        target: confirmed_quantity
      - type: field
        source: PRI/e1
        target: unit_price
