name: ordrsp_to_csv
source_type: EANCOM_ORDRSP
target_type: CSV_ORDRSP

rules:
  - type: foreach
    source: LINE_ITEM
    target: rows
    rules:
      - type: field
        source: /BGM/e2
        target: response_number
      - type: field
        source: LIN/e1
        target: line_number
      - type: field
        source: LIN/e3/c1
        target: item_id
      - type: field
        source: QTY[c1='21']/e1/c2
        target: confirmed_quantity
      - type: field
        source: PRI[c1='AAA']/e1/c2
        target: unit_price
